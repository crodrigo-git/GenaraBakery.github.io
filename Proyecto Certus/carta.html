    <main>
      <article>
  <h2> Catalogo de postres </h2>

  <div class="grid-postres">

    <div class="postre">
      <h3>Cheesecake</h3>
      <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187">
      <p>Delicioso cheesecake cremoso</p>
      <button onclick="agregarAlCarrito('Cheesecake', 20)">Agregar</button>
    </div>

    <div class="postre">
      <h3>Brownies</h3>
      <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
      <p>Brownies de chocolate con textura suave.</p>
      <button onclick="agregarAlCarrito('Brownies', 15)">Agregar</button>
    </div>

    <div class="postre">
      <h3>Muffyns</h3>
      <img src="https://images.unsplash.com/photo-1587668178277-295251f900ce">
      <p>Muffyns decorados para cualquier ocasión.</p>
      <button onclick="agregarAlCarrito('Muffyns', 10)">Agregar</button>
    </div>

  </div>

</article> 
       <h2>Carrito</h2>
<ul id="carrito"></ul>
<p id="total"></p>
    </main>
    <footer>
      <p> © 2026 Genara Bakery </p>
    </footer>
  <script>
let carrito = [];

function agregarAlCarrito(nombre, precio) {
  carrito.push({ nombre, precio });
  mostrarCarrito();
}

function eliminarProducto(index) {
  carrito.splice(index, 1);
  mostrarCarrito();
}

function mostrarCarrito() {
  let lista = document.getElementById("carrito");
  let totalTexto = document.getElementById("total");

  lista.innerHTML = "";
  let total = 0;

  carrito.forEach((producto, index) => {
    let item = document.createElement("li");
    item.innerHTML = `
      ${producto.nombre} - S/ ${producto.precio}
      <button onclick="eliminarProducto(${index})">❌</button>
    `;
    lista.appendChild(item);
    total += producto.precio;
  });

  totalTexto.textContent = "Total: S/ " + total;
}
</script>
  </body>
</html>
